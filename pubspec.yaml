name: dijji_firebase
description: FCM and APNs glue for the Dijji engagement layer — one-line attach() wires push tokens, refresh, foreground delivery, and tap events. Companion to the dijji Flutter SDK.
version: 1.0.1-alpha
homepage: https://dijji.com
repository: https://github.com/urbaneyed/dijji_firebase
issue_tracker: https://github.com/urbaneyed/dijji_firebase/issues
documentation: https://dijji.com/install/flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Tracks the published dijji on pub.dev. The companion only uses the
  # registerPushToken + trackPushEvent surface that has been stable since
  # 1.0.0-alpha, so a wider constraint keeps both v1.0 and v1.1 callers happy.
  dijji: ">=1.0.0-alpha <2.0.0"
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
